<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIEFSDAN-DOG</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: #d4af37;
            font-family: 'serif';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            width: 300px;
            height: 450px;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border: 2px solid #d4af37;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h1 { font-size: 24px; margin-bottom: 10px; letter-spacing: 2px; }
        .mask-area {
            width: 150px;
            height: 150px;
            border: 2px dashed #d4af37;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>BRIEFSDAN-DOG</h1>
    <div class="mask-area">MASK AREA</div>
    <p>VIP STATUS</p>
</div>

</body>
</html>
